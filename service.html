<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERVICE｜HAPELY</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#ffffff;
    --text:#1f1a17;
    --muted:#2f241f;
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:sans-serif;
    color:var(--text);
    overflow-x:hidden;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:1000;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:14px 18px;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(10px);
}

.logo{
    font-family:'Cormorant Garamond', serif;
    font-size:18px;
    letter-spacing:2px;
}

.nav{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:flex-end;
}

.nav a{
    font-size:11px;
    letter-spacing:1px;
    text-decoration:none;
    color:var(--text);
    opacity:0.75;
    transition:0.25s ease;
}

.nav a:hover{
    opacity:1;
    transform:translateY(-2px);
}

/* LAYOUT */
.container{
    min-height:100svh;
    padding:90px 14px 60px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:34px;
}

h1{
    font-family:'Cormorant Garamond', serif;
    font-size:42px;
    letter-spacing:2px;
}

/* CARD */
.card{
    width:100%;
    max-width:860px;
    padding:24px 20px;
    border-radius:18px;

    background:rgba(214,228,245,0.35);
    border:1px solid rgba(0,0,0,0.05);
    backdrop-filter:blur(10px);

    opacity:0;
    transform:translateY(20px);
    transition:0.7s ease;
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

.service-title{
    font-family:'Cormorant Garamond', serif;
    font-size:24px;
    margin-bottom:6px;
}

.card p{
    font-size:14px;
    line-height:1.8;
    color:var(--muted);
}

.meta{
    margin-top:8px;
    font-size:12px;
    opacity:0.8;
}

.price{
    margin-top:8px;
    font-size:13px;
}

/* ================= CTA（最重要） ================= */
.cta-main{
    margin-top:26px;
    display:inline-block;
    padding:14px 28px;
    border-radius:999px;

    background:#2a1f1b;
    color:#fff;

    text-decoration:none;
    font-size:12px;
    letter-spacing:2px;

    transition:0.25s ease;
}

.cta-main:hover{
    transform:translateY(-3px);
    opacity:0.9;
}

/* SUB CTA（WORK誘導） */
.cta-sub{
    margin-top:14px;
    display:inline-block;

    font-size:12px;
    letter-spacing:2px;

    color:#2a1f1b;
    text-decoration:none;

    border-bottom:1px solid rgba(0,0,0,0.25);
    padding-bottom:3px;

    opacity:0.75;
    transition:0.25s ease;
}

.cta-sub:hover{
    opacity:1;
}

/* FOOTER */
.footer{
    background:#fff;
    padding:40px 16px;
    border-top:1px solid rgba(0,0,0,0.08);
}

.footer-inner{
    max-width:1000px;
    margin:0 auto;

    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:16px;
}

/* SNS */
.sns{
    display:flex;
    gap:18px;
    align-items:center;
}

/* ICON FIX */
.icon{
    width:30px;
    height:30px;
    stroke:#2f241f !important;
    fill:none !important;
    stroke-width:1.6;
    opacity:0.85;
    transition:0.25s ease;
}

.icon:hover{
    opacity:1;
    transform:translateY(-3px);
}

.tiktok{
    font-size:18px;
    color:#2f241f !important;
}

/* MOBILE */
@media(max-width:768px){

    .header{
        flex-direction:column;
        gap:8px;
        padding:12px;
    }

    .nav{
        justify-content:center;
    }

    h1{
        font-size:34px;
    }

    .footer-inner{
        flex-direction:column;
        text-align:center;
    }

    .sns{
        justify-content:center;
    }
}
</style>
</head>

<body>

<header class="header">
    <div class="logo">HAPELY</div>

    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="service.html">SERVICE</a>
        <a href="work.html">WORK</a>
        <a href="contact.html">CONTACT</a>
    </nav>
</header>

<div class="container">

    <h1>SERVICE</h1>

    <div class="card">
        <div class="service-title">Long Video Editing</div>
        <p>YouTube・ブランドムービー・ドキュメンタリー</p>
        <div class="meta">納期：7〜14日</div>
        <div class="price">¥30,000〜¥120,000</div>
    </div>

    <div class="card">
        <div class="service-title">Short Video</div>
        <p>TikTok / Instagram / Shorts</p>
        <div class="meta">納期：2〜5日</div>
        <div class="price">¥5,000〜¥30,000</div>
    </div>

    <div class="card">
        <div class="service-title">Shooting</div>
        <p>撮影＋世界観設計</p>
        <div class="meta">納期：5〜10日</div>
        <div class="price">¥20,000〜¥100,000</div>
    </div>

    <!-- ✅ 主導線：CONTACT -->
    <a href="contact.html" class="cta-main">見積もり・相談する →</a>

    <!-- ✅ 副導線：WORK -->
    <a href="work.html" class="cta-sub">制作実績を見る</a>

</div>

<footer class="footer">
    <div class="footer-inner">

        <div>© HAPELY</div>

        <div class="sns">

            <a href="https://www.instagram.com/china.tsuna.tuna/" target="_blank">
                <svg class="icon" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="5"/>
                    <circle cx="12" cy="12" r="3.5"/>
                    <circle cx="17.5" cy="6.5" r="1.2"/>
                </svg>
            </a>

            <a href="https://www.youtube.com/" target="_blank">
                <svg class="icon" viewBox="0 0 24 24">
                    <rect x="3" y="5" width="18" height="14" rx="4"/>
                    <path d="M10 9l5 3-5 3z"/>
                </svg>
            </a>

            <a href="https://www.tiktok.com/" class="tiktok">♪</a>

        </div>

    </div>
</footer>

<script>
const cards = document.querySelectorAll(".card");

const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
},{threshold:0.2});

cards.forEach(c=>observer.observe(c));
</script>

</body>
</html>
