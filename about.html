<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABOUT｜HAPELY</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#D2E5FE;
    --text:#1f1a17;
    --muted:#4a3f3a;
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:sans-serif;
    color:var(--text);
    overflow-x:hidden;
}

/* ================= HEADER（HOME統一） ================= */
.header{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 40px;
    z-index:1000;
}

.logo{
    font-family:'Cormorant Garamond', serif;
    font-size:20px;
    letter-spacing:3px;
    color:var(--text);
}

.nav{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.nav a{
    color:var(--text);
    text-decoration:none;
    font-size:12px;
    letter-spacing:2px;
    opacity:0.75;
    transition:0.3s;
}

.nav a:hover{
    opacity:1;
}

/* ================= CONTENT ================= */
.container{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:160px 5vw 80px;
    gap:50px;
    position:relative;
}

/* 背景カード（HOME寄せ） */
.container::before{
    content:"";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:92%;
    max-width:900px;
    height:85%;
    background:rgba(255,255,255,0.25);
    border-radius:28px;
    backdrop-filter:blur(10px);
    z-index:-1;
}

/* TITLE */
h1{
    font-family:'Cormorant Garamond', serif;
    font-size:64px;
    letter-spacing:2px;
}

/* TEXT */
p{
    max-width:700px;
    line-height:2.2;
    color:var(--muted);
    font-size:15px;
}

/* ANIMATION */
.block{
    opacity:0;
    transform:translateY(40px);
    transition:0.9s ease;
}

.block.show{
    opacity:1;
    transform:translateY(0);
}

/* ================= FOOTER（HOME統一） ================= */
.footer{
    background:#fff;
    padding:70px 40px;
    border-top:1px solid rgba(0,0,0,0.08);
}

.footer-inner{
    max-width:1100px;
    margin:0 auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    letter-spacing:2px;
    color:#2f241f;
    position:relative;
}

/* SNS中央 */
.sns{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:28px;
    align-items:center;
}

.icon{
    width:38px;
    height:38px;
    stroke:#2f241f;
    fill:none;
    opacity:0.75;
    transition:0.3s;
}

.icon:hover{
    opacity:1;
    transform:translateY(-4px);
}

.tiktok{
    font-size:24px;
    width:38px;
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#2f241f;
    text-decoration:none;
    opacity:0.75;
    transition:0.3s;
}

.tiktok:hover{
    opacity:1;
    transform:translateY(-4px);
}

/* ================= MOBILE ================= */
@media(max-width:768px){

    .header{
        padding:18px 20px;
        flex-direction:column;
        gap:10px;
    }

    .nav{
        justify-content:center;
        gap:12px;
    }

    h1{
        font-size:44px;
    }

    p{
        font-size:14px;
    }

    .container::before{
        height:90%;
        width:95%;
    }

    .footer-inner{
        flex-direction:column;
        gap:25px;
    }

    .sns{
        position:static;
        transform:none;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">HAPELY</div>

    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="service.html">SERVICE</a>
        <a href="work.html">WORK</a>
        <a href="contact.html">CONTACT</a>
    </nav>
</header>

<!-- CONTENT -->
<div class="container">

    <div class="block">
        <h1>ABOUT</h1>
    </div>

    <div class="block">
        <p>
            HAPELYは動画・写真を通して、<br>
            日常の中にある幸せや感情を映像として残す<br>
            クリエイティブブランドです。
        </p>
    </div>

    <div class="block">
        <p>
            「HAPELY」という名前には<br>
            幸せ・やさしさ・自然体という意味を込めています。
        </p>
    </div>

    <div class="block">
        <p>
            美しく、感情に残る表現を大切にしながら<br>
            作品を制作しています。
        </p>
    </div>

</div>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-inner">

        <div>© HAPELY</div>

        <div class="sns">

            <!-- Instagram -->
            <a href="https://www.instagram.com/china.tsuna.tuna/"
               target="_blank"
               rel="noopener noreferrer">
                <svg class="icon" viewBox="0 0 24 24" stroke-width="1.6">
                    <rect x="3" y="3" width="18" height="18" rx="5"/>
                    <circle cx="12" cy="12" r="3.5"/>
                    <circle cx="17.5" cy="6.5" r="1.2"/>
                </svg>
            </a>

            <!-- YouTube -->
            <a href="https://www.youtube.com/"
               target="_blank">
                <svg class="icon" viewBox="0 0 24 24" stroke-width="1.6">
                    <rect x="3" y="5" width="18" height="14" rx="4"/>
                    <path d="M10 9l5 3-5 3z" fill="currentColor"/>
                </svg>
            </a>

            <!-- TikTok -->
            <a href="https://www.tiktok.com/"
               class="tiktok">♪</a>

        </div>

    </div>
</footer>

<script>
const blocks = document.querySelectorAll(".block");

const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
},{threshold:0.2});

blocks.forEach(b=>observer.observe(b));
</script>

</body>
</html>
