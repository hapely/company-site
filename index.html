<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAPELY｜Creator</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#D6E4F5;
    --text:#1f1a17;
    --muted:#4a3f3a;
}

/* reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:sans-serif;
    overflow-x:hidden;
    color:var(--text);
}

/* ================= HEADER ================= */
.header{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 40px;
    z-index:1000;
}

.logo{
    font-family:'Cormorant Garamond', serif;
    font-size:20px;
    letter-spacing:3px;
    color:var(--text);
}

.nav a{
    color:var(--text);
    text-decoration:none;
    margin-left:20px;
    font-size:12px;
    letter-spacing:2px;
    opacity:0.75;
    transition:0.3s;
}

.nav a:hover{
    opacity:1;
}

/* ================= SECTIONS ================= */
section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    position:relative;
    overflow:hidden;
}

/* HERO */
.hero h1{
    font-family:'Cormorant Garamond', serif;
    font-size:72px;
}

.hero p{
    color:var(--muted);
}

/* ================= IMAGE ================= */
.media{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
}

.media img{
    width:82%;
    height:82%;
    object-fit:cover;
    border-radius:32px;
    box-shadow:0 25px 70px rgba(0,0,0,0.12);
    transition:0.5s ease;
    filter:saturate(0.95) contrast(1.02);
}

.media:hover img{
    transform:scale(1.05);
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.06);
}

/* ================= TEXT ================= */
h2{
    font-family:'Cormorant Garamond', serif;
    font-size:42px;
    position:relative;
    z-index:2;
}

p{
    color:var(--muted);
    position:relative;
    z-index:2;
}

/* ================= ANIMATION ================= */
.fade{
    opacity:0;
    transform:translateY(40px);
    transition:0.9s ease;
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}

/* ================= FOOTER（SNS中央修正済み） ================= */
.footer{
    background:#fff;
    padding:70px 40px;
    border-top:1px solid rgba(0,0,0,0.08);
}

.footer-inner{
    max-width:1100px;
    margin:0 auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    letter-spacing:2px;
    color:#2f241f;

    position:relative; /* ★SNS中央配置の基準 */
}

/* ★SNS完全中央固定 */
.sns{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:28px;
    align-items:center;
}

/* アイコン統一 */
.icon{
    width:38px;
    height:38px;
    stroke:#2f241f;
    fill:none;
    opacity:0.75;
    transition:0.3s;
}

.icon:hover{
    opacity:1;
    transform:translateY(-4px);
}

/* TikTok */
.tiktok{
    font-size:24px;
    width:38px;
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#2f241f;
    text-decoration:none;
    opacity:0.75;
    transition:0.3s;
}

.tiktok:hover{
    opacity:1;
    transform:translateY(-4px);
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">HAPELY</div>

    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="service.html">SERVICE</a>
        <a href="work.html">WORK</a>
        <a href="contact.html">CONTACT</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero fade">
    <h1>HAPELY</h1>
    <p>Creator｜tsuna</p>
</section>

<!-- ABOUT -->
<section class="fade">
    <a href="about.html" class="media">
        <img src="image/IMG_4385.jpg">
        <div class="overlay"></div>
    </a>
    <h2>ABOUT</h2>
    <p>Profile / Story</p>
</section>

<!-- SERVICE -->
<section class="fade">
    <a href="service.html" class="media">
        <img src="image/IMG_4386.jpg">
        <div class="overlay"></div>
    </a>
    <h2>SERVICE</h2>
    <p>Video / SNS</p>
</section>

<!-- WORK -->
<section class="fade">
    <a href="work.html" class="media">
        <img src="image/IMG_4387.jpg">
        <div class="overlay"></div>
    </a>
    <h2>WORK</h2>
    <p>YouTube / Instagram</p>
</section>

<!-- CONTACT -->
<section class="fade">
    <a href="contact.html" class="media">
        <img src="image/IMG_4390.jpg">
        <div class="overlay"></div>
    </a>
    <h2>CONTACT</h2>
    <p>Mail / Form</p>
</section>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-inner">

        <div>© HAPELY</div>

        <div class="sns">

            <!-- Instagram -->
            <a href="https://www.instagram.com/china.tsuna.tuna/"
               target="_blank"
               rel="noopener noreferrer">

                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                    <rect x="3" y="3" width="18" height="18" rx="5"/>
                    <circle cx="12" cy="12" r="3.5"/>
                    <circle cx="17.5" cy="6.5" r="1.2"/>
                </svg>

            </a>

            <!-- YouTube -->
            <a href="https://www.youtube.com/hashtag/%E3%81%A4%E3%81%AA%E3%81%A1%E3%82%83%E3%82%93%E3%81%AD%E3%82%8B"
               target="_blank"
               rel="noopener noreferrer">

                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                    <rect x="3" y="5" width="18" height="14" rx="4"/>
                    <path d="M10 9l5 3-5 3z" fill="currentColor"/>
                </svg>

            </a>

            <!-- TikTok -->
            <a href="https://www.tiktok.com/@tsunachannel"
               target="_blank"
               rel="noopener noreferrer"
               class="tiktok">♪</a>

        </div>

    </div>
</footer>

<script>
const targets = document.querySelectorAll(".fade");

const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
},{threshold:0.2});

targets.forEach(el=>observer.observe(el));
</script>

</body>
</html>
