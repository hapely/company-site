<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTACT｜HAPELY</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#D2E5FE;
    --text:#2a1f1b;
    --muted:#4a3f3a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:sans-serif;
    background:var(--bg);
    color:var(--text);

    /* フッター最下部固定用 */
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* ================= HEADER ================= */
.header{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 40px;
    z-index:1000;
}

.logo{
    font-family:'Cormorant Garamond', serif;
    font-size:20px;
    letter-spacing:3px;
}

.nav a{
    margin-left:20px;
    text-decoration:none;
    font-size:12px;
    letter-spacing:2px;
    color:var(--text);
    opacity:0.75;
    transition:0.3s;
}

.nav a:hover{
    opacity:1;
}

/* ================= BACK BUTTON ================= */
.back{
    position:fixed;
    top:90px;
    left:20px;
    text-decoration:none;

    padding:10px 16px;
    border:1px solid var(--text);
    border-radius:999px;

    font-size:12px;
    letter-spacing:2px;
    color:var(--text);

    transition:0.3s;
    background:transparent;
}

.back:hover{
    background:var(--text);
    color:#fff;
    transform:translateY(-2px);
}

/* ================= CENTER CONTENT ================= */
.wrapper{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:120px 20px 60px;
}

h1{
    font-family:'Cormorant Garamond', serif;
    font-size:60px;
    margin-bottom:25px;
}

form{
    display:flex;
    flex-direction:column;
    gap:15px;
    width:320px;
}

input,textarea{
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:14px;
    outline:none;
}

textarea{
    min-height:120px;
}

/* ================= BUTTON ================= */
button{
    padding:12px;
    background:var(--text);
    color:white;
    border:none;
    border-radius:8px;
    letter-spacing:2px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    opacity:0.9;
}

/* ================= THANK YOU ================= */
.thankyou{
    position:fixed;
    inset:0;
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    font-family:'Cormorant Garamond', serif;
    font-size:38px;
    letter-spacing:3px;

    opacity:0;
    pointer-events:none;
    transition:0.6s ease;
}

.thankyou.show{
    opacity:1;
    pointer-events:auto;
}

/* ================= FOOTER ================= */
.footer{
    margin-top:auto;
    background:#fff;
    padding:50px 40px;
    border-top:1px solid rgba(0,0,0,0.08);
}

.footer-inner{
    max-width:1100px;
    margin:0 auto;

    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    letter-spacing:2px;
    color:var(--text);
}

/* ★中央寄せ修正 */
.sns{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:28px;
    align-items:center;
}

/* SNSアイコン統一色 */
.icon{
    width:34px;
    height:34px;
    color:var(--text);
    opacity:0.75;
    transition:0.3s;
}

.icon:hover{
    opacity:1;
    transform:translateY(-3px);
}

.tiktok{
    font-size:22px;
    width:34px;
    height:34px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text);
    text-decoration:none;
    opacity:0.75;
    transition:0.3s;
}

.tiktok:hover{
    opacity:1;
    transform:translateY(-3px);
}

/* footer layout fix */
.footer-inner{
    position:relative;
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">HAPELY</div>

    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="service.html">SERVICE</a>
        <a href="work.html">WORK</a>
        <a href="contact.html">CONTACT</a>
    </nav>
</header>

<!-- BACK BUTTON -->
<a class="back" href="index.html">← BACK</a>

<!-- CONTENT -->
<div class="wrapper">

    <h1>CONTACT</h1>

    <form id="form" action="https://formspree.io/f/xgoqjkrr" method="POST">

        <input type="text" name="name" placeholder="お名前" required>
        <input type="email" name="email" placeholder="メールアドレス" required>
        <textarea name="message" placeholder="お問い合わせ内容" required></textarea>

        <button type="submit">SEND</button>
    </form>

</div>

<!-- THANK YOU -->
<div class="thankyou" id="thankyou">
    <div>THANK YOU</div>
    <div style="font-size:16px; margin-top:10px;">MESSAGE SENT</div>
</div>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-inner">

        <div>© HAPELY</div>

        <div class="sns">

            <a href="#">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                    <rect x="3" y="3" width="18" height="18" rx="5"/>
                    <circle cx="12" cy="12" r="3.5"/>
                </svg>
            </a>

            <a href="#">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                    <rect x="3" y="5" width="18" height="14" rx="4"/>
                    <path d="M10 9l5 3-5 3z" fill="currentColor"/>
                </svg>
            </a>

            <a href="#" class="tiktok">♪</a>

        </div>

        <div></div>

    </div>
</footer>

<script>
const form = document.getElementById("form");
const thankyou = document.getElementById("thankyou");

form.addEventListener("submit", async (e)=>{
    e.preventDefault();

    const btn = form.querySelector("button");
    btn.innerText = "SENDING...";

    const res = await fetch(form.action, {
        method:"POST",
        body:new FormData(form),
        headers:{ "Accept":"application/json" }
    });

    if(res.ok){
        thankyou.classList.add("show");

        setTimeout(()=>{
            thankyou.classList.remove("show");
            form.reset();
            btn.innerText = "SEND";
        },2500);
    }else{
        alert("エラーが発生しました");
        btn.innerText = "SEND";
    }
});
</script>

</body>
</html>
