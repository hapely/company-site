<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORK｜HAPELY</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#D2E5FE;
    font-family:sans-serif;
    color:#2a1f1b;
    overflow-x:hidden;
}

/* ================= HEADER ================= */
.header{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 22px;
    z-index:1000;
    mix-blend-mode:difference;
}

.logo{
    font-family:'Cormorant Garamond', serif;
    color:white;
    letter-spacing:3px;
    font-size:18px;
}

.nav{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    justify-content:flex-end;
}

.nav a{
    color:white;
    text-decoration:none;
    font-size:11px;
    letter-spacing:1.5px;
    opacity:0.8;
}

/* ================= TITLE ================= */
.title{
    text-align:center;
    padding:120px 16px 30px;
    font-size:42px;
    font-family:'Cormorant Garamond', serif;
}

/* ================= SECTION ================= */
.section{
    max-width:1000px;
    margin:0 auto 80px;
    padding:0 16px;
}

/* ================= VIEWER ================= */
.viewer-wrap{
    position:relative;
}

.viewer{
    width:100%;
    height:55vh;
    background:#fff;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:12px;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
    position:relative;
}

/* ====== SLIDE ANIMATION ====== */
.viewer img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    padding:8px;
    position:absolute;
    transition:0.45s ease;
}

/* 左右スライド用 */
.slide-in-right{
    animation:inRight 0.45s ease;
}

.slide-in-left{
    animation:inLeft 0.45s ease;
}

@keyframes inRight{
    from{transform:translateX(40px); opacity:0;}
    to{transform:translateX(0); opacity:1;}
}

@keyframes inLeft{
    from{transform:translateX(-40px); opacity:0;}
    to{transform:translateX(0); opacity:1;}
}

/* ================= ARROW ================= */
.arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:44px;
    height:44px;
    border:none;
    background:rgba(255,255,255,0.7);
    border-radius:50%;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10;
}

.arrow svg{
    width:20px;
    height:20px;
    stroke:#2a1f1b;
    stroke-width:2;
    fill:none;
}

.left{left:8px;}
.right{right:8px;}

/* ================= THUMBS ================= */
.thumb-list{
    display:flex;
    gap:10px;
    overflow-x:auto;
    margin-top:14px;
}

.thumb{
    flex:0 0 auto;
    width:80px;
    height:55px;
    background:#fff;
    opacity:0.5;
    border:2px solid transparent;
}

.thumb img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.thumb.active{
    opacity:1;
    border:2px solid #2a1f1b;
}

/* ================= CARD ================= */
.card{
    background:#fff;
    padding:28px 20px;
    text-align:center;
    cursor:pointer;
    box-shadow:0 15px 40px rgba(0,0,0,0.12);
    border-radius:12px;
}

.card h3{
    font-size:18px;
    margin-bottom:8px;
    font-family:'Cormorant Garamond', serif;
}

.card p{
    font-size:13px;
    opacity:0.7;
}

/* ================= FOOTER ================= */
.footer{
    background:#fff;
    padding:50px 20px;
    border-top:1px solid rgba(0,0,0,0.08);
}

.footer-inner{
    max-width:1100px;
    margin:0 auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:11px;
    position:relative;
}

.sns{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:18px;
}

.icon{
    width:30px;
    height:30px;
    stroke:#2f241f;
    opacity:0.8;
}

.tiktok{
    font-size:18px;
    color:#2f241f;
}

/* ================= MOBILE ================= */
@media (max-width:768px){

    .nav{
        display:none;
    }

    .title{
        font-size:34px;
    }

    .viewer{
        height:45vh;
    }

    .arrow{
        width:38px;
        height:38px;
    }

    .thumb{
        width:60px;
        height:45px;
    }

    .footer-inner{
        flex-direction:column;
        gap:20px;
    }

    .sns{
        position:static;
        transform:none;
    }
}
</style>
</head>

<body>

<header class="header">
    <div class="logo">HAPELY</div>
    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="service.html">SERVICE</a>
        <a href="work.html">WORK</a>
        <a href="contact.html">CONTACT</a>
    </nav>
</header>

<div class="title">WORK</div>

<div class="section">

    <div class="viewer-wrap">

        <button class="arrow left" onclick="prev()">‹</button>

        <div class="viewer">
            <img id="main" src="image/IMG_4391.jpg">
        </div>

        <button class="arrow right" onclick="next()">›</button>

    </div>

    <div class="thumb-list">
        <div class="thumb" onclick="set(0)"><img src="image/IMG_4391.jpg"></div>
        <div class="thumb" onclick="set(1)"><img src="image/IMG_4392.jpg"></div>
        <div class="thumb" onclick="set(2)"><img src="image/IMG_4393.jpg"></div>
        <div class="thumb" onclick="set(3)"><img src="image/IMG_4394.jpg"></div>
        <div class="thumb" onclick="set(4)"><img src="image/IMG_4396.jpg"></div>
        <div class="thumb" onclick="set(5)"><img src="image/IMG_4397.jpg"></div>
        <div class="thumb" onclick="set(6)"><img src="image/IMG_4398.jpg"></div>
    </div>

</div>

<div class="section">
    <div class="card" onclick="window.open('https://youtube.com','_blank')">
        <h3>YouTube</h3>
        <p>Vlog / Cinematic</p>
    </div>
</div>

<div class="section">
    <div class="card" onclick="window.open('https://tiktok.com','_blank')">
        <h3>TikTok</h3>
        <p>Short Form</p>
    </div>
</div>

<footer class="footer">
    <div class="footer-inner">
        <div>© HAPELY</div>

        <div class="sns">
            <a href="#"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18"/><circle cx="12" cy="12" r="3"/></svg></a>
            <a href="#"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="5" width="18" height="14"/><path d="M10 9l5 3-5 3"/></svg></a>
            <a class="tiktok">♪</a>
        </div>
    </div>
</footer>

<script>
const images = [
"image/IMG_4391.jpg",
"image/IMG_4392.jpg",
"image/IMG_4393.jpg",
"image/IMG_4394.jpg",
"image/IMG_4396.jpg",
"image/IMG_4397.jpg",
"image/IMG_4398.jpg"
];

let i = 0;
let direction = "right";

function animate(){
    const img = document.getElementById("main");
    img.classList.remove("slide-in-left","slide-in-right");
    void img.offsetWidth;
    img.classList.add(direction === "right" ? "slide-in-right" : "slide-in-left");
}

function set(index){
    direction = index > i ? "right" : "left";
    i = index;
    update();
}

function next(){
    direction = "right";
    i = (i + 1) % images.length;
    update();
}

function prev(){
    direction = "left";
    i = (i - 1 + images.length) % images.length;
    update();
}

function update(){
    animate();
    document.getElementById("main").src = images[i];

    document.querySelectorAll(".thumb").forEach((t,idx)=>{
        t.classList.toggle("active", idx === i);
    });
}

update();
</script>

</body>
</html>
