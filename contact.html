<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTACT｜HAPELY</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#D2E5FE;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* ================= BACK ================= */
.back{
    position:fixed;
    top:20px;
    left:20px;
    text-decoration:none;
    color:#2a1f1b;
    font-size:12px;
}

/* ================= TITLE ================= */
h1{
    font-family:'Cormorant Garamond', serif;
    font-size:60px;
    text-align:center;
    margin-bottom:25px;
}

/* ================= FORM ================= */
form{
    display:flex;
    flex-direction:column;
    gap:15px;
    width:320px;
}

input,textarea{
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:14px;
    outline:none;
}

textarea{
    min-height:120px;
}

/* ================= BUTTON ================= */
button{
    padding:12px;
    background:#2a1f1b;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:8px;
    letter-spacing:2px;
    transition:0.3s;
}

button:disabled{
    opacity:0.6;
}

/* ================= THANK YOU ================= */
.thankyou{
    position:fixed;
    inset:0;
    background:#D2E5FE;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:'Cormorant Garamond', serif;
    font-size:38px;
    letter-spacing:3px;
    opacity:0;
    pointer-events:none;
    transition:0.6s ease;
}

.thankyou.show{
    opacity:1;
    pointer-events:auto;
}
</style>
</head>

<body>

<a class="back" href="index.html">← BACK</a>

<!-- THANK YOU -->
<div class="thankyou" id="thankyou">
    <div>THANK YOU</div>
    <div style="font-size:18px; margin-top:10px;">MESSAGE SENT</div>
</div>

<div>
    <h1>CONTACT</h1>

    <form id="form" action="https://formspree.io/f/xgoqjkrr" method="POST">

        <input type="text" name="name" placeholder="お名前" required>

        <input type="email" name="email" placeholder="メールアドレス" required>

        <textarea name="message" placeholder="お問い合わせ内容" required></textarea>

        <button id="btn" type="submit">SEND</button>

    </form>
</div>

<script>

/* ==============================
   フォーム送信（安定版）
============================== */
const form = document.getElementById("form");
const btn = document.getElementById("btn");
const thankyou = document.getElementById("thankyou");

form.addEventListener("submit", async (e)=>{
    e.preventDefault();

    // ローディング開始
    btn.disabled = true;
    btn.innerText = "SENDING...";

    try {
        const res = await fetch(form.action, {
            method: "POST",
            body: new FormData(form),
            headers: { "Accept": "application/json" }
        });

        if(res.ok){
            // THANK YOU表示
            thankyou.classList.add("show");

            btn.innerText = "SENT";

            setTimeout(()=>{
                thankyou.classList.remove("show");
                form.reset();
                btn.disabled = false;
                btn.innerText = "SEND";
            }, 2500);

        } else {
            throw new Error("送信失敗");
        }

    } catch (err) {
        console.log(err);
        alert("送信に失敗しました。もう一度試してください");
        btn.disabled = false;
        btn.innerText = "SEND";
    }
});

</script>

</body>
</html>
