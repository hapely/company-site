<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTACT｜HAPELY</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#D6E4F5;
    --text:#1f1a17;
    --muted:#4a3f3a;
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:sans-serif;
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 40px;
    z-index:1000;
}

.logo{
    font-family:'Cormorant Garamond', serif;
    font-size:20px;
    letter-spacing:3px;
    color:var(--text);
    flex-shrink:0;
}

.nav{
    display:flex;
    gap:20px;
}

.nav a{
    color:var(--text);
    text-decoration:none;
    font-size:12px;
    letter-spacing:2px;
    opacity:0.75;
    transition:0.3s;
}

.nav a:hover{
    opacity:1;
}

/* CONTENT */
.wrapper{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:140px 20px 100px;
}

h1{
    font-family:'Cormorant Garamond', serif;
    font-size:72px;
    margin-bottom:12px;
}

.subtitle{
    color:var(--muted);
    margin-bottom:50px;
}

/* FORM */
form{
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    gap:16px;
}

input,
textarea{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#fff;
    font-size:14px;
    outline:none;
    color:var(--text);
    box-shadow:0 8px 30px rgba(0,0,0,0.05);
}

textarea{
    min-height:160px;
    resize:vertical;
}

button{
    margin-top:8px;
    padding:15px;
    border:none;
    border-radius:999px;
    background:var(--text);
    color:#fff;
    font-size:12px;
    letter-spacing:2px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    opacity:0.9;
}

/* THANK YOU */
.thankyou{
    position:fixed;
    inset:0;
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:'Cormorant Garamond', serif;
    letter-spacing:3px;
    opacity:0;
    pointer-events:none;
    transition:0.6s ease;
    z-index:9999;
}

.thankyou.show{
    opacity:1;
    pointer-events:auto;
}

.thankyou h2{
    font-size:56px;
    margin-bottom:10px;
}

.thankyou p{
    font-size:16px;
    color:var(--muted);
}

/* FOOTER（ここが抜けてた原因） */
.footer{
    background:#fff;
    padding:70px 40px;
    border-top:1px solid rgba(0,0,0,0.08);
}

.footer-inner{
    max-width:1100px;
    margin:0 auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    letter-spacing:2px;
    color:#2f241f;
    position:relative;
}

/* SNS中央 */
.sns{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:28px;
    align-items:center;
}

/* アイコン */
.icon{
    width:38px;
    height:38px;
    stroke:#2f241f;
    fill:none;
    opacity:0.75;
    transition:0.3s;
}

.icon:hover{
    opacity:1;
    transform:translateY(-4px);
}

/* TikTok */
.tiktok{
    font-size:24px;
    width:38px;
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#2f241f;
    text-decoration:none;
    opacity:0.75;
    transition:0.3s;
}

.tiktok:hover{
    opacity:1;
    transform:translateY(-4px);
}
</style>
</head>

<body>

<header class="header">
    <div class="logo">HAPELY</div>

    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="service.html">SERVICE</a>
        <a href="work.html">WORK</a>
        <a href="contact.html">CONTACT</a>
    </nav>
</header>

<div class="wrapper">

    <h1>CONTACT</h1>
    <p class="subtitle">Feel free to contact me.</p>

    <form id="form"
          action="https://formspree.io/f/xgoqjkrr"
          method="POST">

        <input type="text" name="name" placeholder="お名前" required>
        <input type="email" name="email" placeholder="メールアドレス" required>
        <textarea name="message" placeholder="お問い合わせ内容" required></textarea>

        <button type="submit">SEND</button>

    </form>

</div>

<div class="thankyou" id="thankyou">
    <h2>THANK YOU</h2>
    <p>MESSAGE SENT</p>
</div>

<footer class="footer">
    <div class="footer-inner">

        <div>© HAPELY</div>

        <div class="sns">

            <a href="https://www.instagram.com/china.tsuna.tuna/" target="_blank">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                    <rect x="3" y="3" width="18" height="18" rx="5"/>
                    <circle cx="12" cy="12" r="3.5"/>
                    <circle cx="17.5" cy="6.5" r="1.2"/>
                </svg>
            </a>

            <a href="https://www.youtube.com/hashtag/%E3%81%A4%E3%81%AA%E3%81%A1%E3%82%83%E3%82%93%E3%81%AD%E3%82%8B" target="_blank">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="3" y="5" width="18" height="14" rx="4"/>
                    <path d="M10 9l5 3-5 3z"/>
                </svg>
            </a>

            <a href="https://www.tiktok.com/@tsunachannel" class="tiktok">♪</a>

        </div>

    </div>
</footer>

<script>
const form = document.getElementById("form");
const thankyou = document.getElementById("thankyou");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const button = form.querySelector("button");
    button.textContent = "SENDING...";

    try{
        const response = await fetch(form.action,{
            method:"POST",
            body:new FormData(form),
            headers:{ "Accept":"application/json" }
        });

        if(response.ok){
            thankyou.classList.add("show");
            form.reset();

            setTimeout(()=>{
                thankyou.classList.remove("show");
            },2500);
        }
    }catch(e){
        alert("通信エラー");
    }

    button.textContent = "SEND";
});
</script>

</body>
</html>
