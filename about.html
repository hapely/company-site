<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABOUT｜HAPELY</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#D2E5FE;
    --text:#1f1a17;
    --muted:#4a3f3a;
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:sans-serif;
    color:var(--text);
    overflow-x:hidden;
}

/* ================= HEADER ================= */
.header{
    position:fixed;
    inset:0 0 auto 0;
    height:64px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 18px;
    background:rgba(214,228,245,0.78);
    backdrop-filter:blur(12px);

    z-index:9999;
}

.logo{
    font-family:'Cormorant Garamond', serif;
    font-size:18px;
    letter-spacing:2px;
}

.nav{
    display:flex;
    gap:14px;
}

.nav a{
    font-size:11px;
    letter-spacing:1px;
    text-decoration:none;
    color:var(--text);
    opacity:0.75;
    transition:0.25s;
}

.nav a:hover{
    opacity:1;
    transform:translateY(-2px);
}

/* ================= CENTER LAYOUT（ここが重要） ================= */
.container{
    min-height:100svh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:90px 16px;
}

/* ★1つの中央カードに統一 */
.card{
    width:min(92%,720px);
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(12px);
    border-radius:28px;
    padding:60px 40px;

    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:28px;

    box-shadow:0 20px 60px rgba(0,0,0,0.08);
}

/* TITLE */
h1{
    font-family:'Cormorant Garamond', serif;
    font-size:clamp(38px,5vw,56px);
    letter-spacing:2px;
    margin-bottom:10px;
}

/* TEXT（行間調整ここが重要） */
p{
    max-width:560px;
    color:var(--muted);
    font-size:15px;
    line-height:1.9;   /* ←間延び修正 */
}

/* ANIMATION */
.fade{
    opacity:0;
    transform:translateY(20px);
    transition:0.7s ease;
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}

/* ================= FOOTER ================= */
.footer{
    background:#fff;
    padding:40px 16px;
    border-top:1px solid rgba(0,0,0,0.08);
}

.footer-inner{
    max-width:1000px;
    margin:0 auto;

    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:16px;
}

/* SNS */
.sns{
    display:flex;
    gap:18px;
    align-items:center;
}

/* ICON FIX */
.icon{
    width:30px;
    height:30px;
    stroke:#2f241f !important;
    fill:none !important;
    stroke-width:1.6;
    opacity:0.85;
    transition:0.25s;
}

.icon:hover{
    opacity:1;
    transform:translateY(-3px);
}

.tiktok{
    font-size:18px;
    color:#2f241f !important;
    text-decoration:none;
    opacity:0.85;
    transition:0.25s;
}

.tiktok:hover{
    opacity:1;
    transform:translateY(-3px);
}

/* MOBILE */
@media(max-width:768px){

    .header{
        flex-direction:column;
        height:auto;
        padding:10px;
        gap:6px;
    }

    .card{
        padding:40px 20px;
        gap:22px;
    }

    p{
        font-size:14px;
    }

    .footer-inner{
        flex-direction:column;
        text-align:center;
    }
}
</style>
</head>

<body>

<header class="header">
    <div class="logo">HAPELY</div>

    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="service.html">SERVICE</a>
        <a href="work.html">WORK</a>
        <a href="contact.html">CONTACT</a>
    </nav>
</header>

<div class="container">

    <div class="card fade">

        <h1>ABOUT</h1>

        <p>
            HAPELYは動画・写真を通して、<br>
            日常の中にある幸せや思い出を写真や映像として残すブランドです。
        </p>

        <p>
            「HAPELY」という名前には<br>
            幸せ・やさしさ・自然体という意味を込めています。
        </p>

        <p>
            美しく、感情に残る表現を大切にしています。
        </p>

    </div>

</div>

<footer class="footer">
    <div class="footer-inner">

        <div>© HAPELY</div>

        <div class="sns">

            <a href="https://www.instagram.com/china.tsuna.tuna/" target="_blank">
                <svg class="icon" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="5"/>
                    <circle cx="12" cy="12" r="3.5"/>
                    <circle cx="17.5" cy="6.5" r="1.2"/>
                </svg>
            </a>

            <a href="https://www.youtube.com/" target="_blank">
                <svg class="icon" viewBox="0 0 24 24">
                    <rect x="3" y="5" width="18" height="14" rx="4"/>
                    <path d="M10 9l5 3-5 3z"/>
                </svg>
            </a>

            <a href="https://www.tiktok.com/" class="tiktok">♪</a>

        </div>

    </div>
</footer>

<script>
const el = document.querySelector(".fade");

const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
},{threshold:0.2});

observer.observe(el);
</script>

</body>
</html>
