<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABOUT｜HAPELY</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#ffffff;
    --text:#2a1f1b;
    --muted:#2f241f;
}

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:sans-serif;
    color:var(--text);
    overflow-x:hidden;
}

/* ================= HEADER ================= */
.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 40px;
    z-index:1000;
    mix-blend-mode:difference;
}

.logo{
    font-family:'Cormorant Garamond', serif;
    font-size:20px;
    letter-spacing:3px;
    color:white;
}

.nav{
    display:flex;
    gap:26px;
}

.nav a{
    text-decoration:none;
    font-size:12px;
    letter-spacing:2px;
    color:white;
    opacity:0.8;
    transition:0.3s;
}

.nav a:hover{
    opacity:1;
}

/* ================= CONTENT ================= */
.container{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:140px 10vw;
    position:relative;
    gap:50px;
}

/* 背景ボックス */
.container::before{
    content:"";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    max-width:900px;
    height:80%;
    background:rgba(210,229,254,0.35);
    border-radius:28px;
    backdrop-filter:blur(8px);
    z-index:-1;
}

h1{
    font-family:'Cormorant Garamond', serif;
    font-size:64px;
    letter-spacing:3px;
}

p{
    max-width:680px;
    line-height:2.2;
    letter-spacing:0.3px;
    color:var(--muted);
}

/* ================= ANIMATION ================= */
.block{
    opacity:0;
    transform:translateY(-40px);
    filter:blur(10px);
    transition:0.9s ease;
}

.block.show{
    opacity:1;
    transform:translateY(0);
    filter:blur(0);
}

/* ================= FOOTER ================= */
.footer{
    background:#fff;
    padding:70px 40px;
    border-top:1px solid rgba(0,0,0,0.08);
}

.footer-inner{
    max-width:1100px;
    margin:0 auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    letter-spacing:2px;
    color:#2f241f;
    position:relative;
}

/* SNS中央固定 */
.sns{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:28px;
    align-items:center;
}

.icon{
    width:40px;
    height:40px;
    stroke:#2f241f;
    fill:none;
    opacity:0.75;
    transition:0.3s;
}

.icon:hover{
    opacity:1;
    transform:translateY(-4px);
}

.tiktok{
    font-size:26px;
    font-weight:500;
    width:40px;
    height:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#2f241f;
    opacity:0.75;
    transition:0.3s;
    text-decoration:none;
}

.tiktok:hover{
    opacity:1;
    transform:translateY(-4px);
}

/* ================= MOBILE ================= */
@media(max-width:768px){

    .header{
        padding:20px;
        flex-direction:column;
        gap:12px;
    }

    .nav{
        gap:14px;
        flex-wrap:wrap;
        justify-content:center;
    }

    h1{
        font-size:48px;
    }

    p{
        font-size:14px;
        line-height:2;
    }

    .footer{
        padding:50px 20px;
    }

    .footer-inner{
        flex-direction:column;
        gap:30px;
    }

    .sns{
        position:static;
        transform:none;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">

    <div class="logo">HAPELY</div>

    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="service.html">SERVICE</a>
        <a href="work.html">WORK</a>
        <a href="contact.html">CONTACT</a>
    </nav>

</header>

<!-- CONTENT -->
<div class="container">

    <div class="block">
        <h1>ABOUT</h1>
    </div>

    <div class="block">
        <p>
            HAPELYは動画・写真を通して、<br>
            色褪せない思い出と多幸感を制作する<br>
            クリエイティブブランドです。
        </p>
    </div>

    <div class="block">
        <p>
            HAPELYの名前には、<br>
            「日常の中にある幸せ、やさしさ、心地よさ、自然体」<br>
            という意味を込めています。
        </p>
    </div>

    <div class="block">
        <p>
            いつも自分自身が幸せであること。<br>
            そして、美しく、感情に残る表現を大切にしています。
        </p>
    </div>

</div>

<!-- FOOTER -->
<footer class="footer">

    <div class="footer-inner">

        <div>© HAPELY</div>

        <div class="sns">
                        <!-- Instagram -->
            <a href="https://www.instagram.com/china.tsuna.tuna/"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="Instagram">

                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                    <rect x="3" y="3" width="18" height="18" rx="5"/>
                    <circle cx="12" cy="12" r="3.5"/>
                    <circle cx="17.5" cy="6.5" r="1.2"/>
                </svg>

            </a>

            <!-- YouTube -->
            <a href="https://www.youtube.com/hashtag/%E3%81%A4%E3%81%AA%E3%81%A1%E3%82%83%E3%82%93%E3%81%AD%E3%82%8B"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="YouTube">

                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                    <rect x="3" y="5" width="18" height="14" rx="4"/>
                    <path d="M10 9l5 3-5 3z" fill="currentColor"/>
                </svg>

            </a>

            <!-- TikTok -->
            <a href="https://www.tiktok.com/@tsunachannel"
               target="_blank"
               rel="noopener noreferrer"
               class="tiktok"
               aria-label="TikTok">♪</a>

        </div>

        <!-- SNS中央固定用の空要素 -->
        <div></div>

    </div>

</footer>

<script>
const blocks = document.querySelectorAll(".block");

const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
},{
    threshold:0.25
});

blocks.forEach(block=>{
    observer.observe(block);
});
</script>

</body>
</html>
