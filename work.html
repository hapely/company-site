<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORK｜HAPELY</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#D2E5FE;
    --text:#1f1a17;
    --muted:#4a3f3a;
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:sans-serif;
    color:var(--text);
    overflow-x:hidden;
}

/* ================= HEADER（完全統一版） ================= */
.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:1000;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:14px 18px;
    background:rgba(214,228,245,0.75);
    backdrop-filter:blur(12px);
}

.logo{
    font-family:'Cormorant Garamond', serif;
    font-size:18px;
    letter-spacing:2px;
}

.nav{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:flex-end;
}

.nav a{
    font-size:11px;
    letter-spacing:1px;
    text-decoration:none;
    color:var(--text);
    opacity:0.75;
    transition:0.25s ease;
}

.nav a:hover{
    opacity:1;
    transform:translateY(-2px);
}

/* ================= TITLE ================= */
.title{
    text-align:center;
    padding:110px 16px 20px;
    font-size:40px;
    font-family:'Cormorant Garamond', serif;
}

/* ================= SECTION ================= */
.section{
    max-width:1000px;
    margin:0 auto 70px;
    padding:0 14px;
}

/* ================= VIEWER ================= */
.viewer-wrap{
    position:relative;
}

.viewer{
    width:100%;
    height:52vh;
    background:#fff;
    border-radius:14px;
    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;

    box-shadow:0 20px 50px rgba(0,0,0,0.12);
    position:relative;
}

.viewer img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    padding:8px;
    position:absolute;
}

/* ANIMATION */
.slide-in-right{animation:inRight .45s ease;}
.slide-in-left{animation:inLeft .45s ease;}

@keyframes inRight{
    from{transform:translateX(30px);opacity:0;}
    to{transform:translateX(0);opacity:1;}
}

@keyframes inLeft{
    from{transform:translateX(-30px);opacity:0;}
    to{transform:translateX(0);opacity:1;}
}

/* ================= ARROW ================= */
.arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:40px;
    height:40px;

    border:none;
    background:rgba(255,255,255,0.8);
    border-radius:50%;

    cursor:pointer;
    z-index:10;

    display:flex;
    align-items:center;
    justify-content:center;
}

.arrow svg{
    width:18px;
    height:18px;
    stroke:#2a1f1b;
    stroke-width:2;
    fill:none;
}

.left{left:10px;}
.right{right:10px;}

/* ================= THUMBS ================= */
.thumb-list{
    display:flex;
    gap:10px;
    overflow-x:auto;
    margin-top:14px;
    padding-bottom:6px;
}

.thumb{
    flex:0 0 auto;
    width:70px;
    height:50px;
    background:#fff;
    border-radius:8px;
    opacity:0.6;
    border:2px solid transparent;
}

.thumb img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.thumb.active{
    opacity:1;
    border-color:#2a1f1b;
}

/* ================= CARDS ================= */
.card{
    background:#fff;
    padding:24px 18px;
    text-align:center;
    border-radius:12px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
    cursor:pointer;
    margin-bottom:16px;
}

.card h3{
    font-family:'Cormorant Garamond', serif;
    margin-bottom:6px;
}

/* ================= FOOTER（完全統一） ================= */
.footer{
    background:#fff;
    padding:40px 16px;
    border-top:1px solid rgba(0,0,0,0.08);
}

.footer-inner{
    max-width:1000px;
    margin:0 auto;

    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:16px;
}

.sns{
    display:flex;
    gap:18px;
    align-items:center;
}

.icon{
    width:30px;
    height:30px;
    stroke:#2f241f !important;
    fill:none !important;
    stroke-width:1.6;
    opacity:0.85;
    transition:0.25s ease;
}

.icon:hover{
    opacity:1;
    transform:translateY(-3px);
}

.tiktok{
    font-size:18px;
    color:#2f241f !important;
}

/* MOBILE */
@media(max-width:768px){

    .header{
        flex-direction:column;
        gap:8px;
        padding:12px;
    }

    .nav{
        justify-content:center;
    }

    .viewer{
        height:42vh;
    }

    .footer-inner{
        flex-direction:column;
        text-align:center;
    }

    .thumb{
        width:60px;
        height:45px;
    }

    .arrow{
        width:36px;
        height:36px;
    }
}
</style>
</head>

<body>

<header class="header">
    <div class="logo">HAPELY</div>

    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="service.html">SERVICE</a>
        <a href="work.html">WORK</a>
        <a href="contact.html">CONTACT</a>
    </nav>
</header>

<div class="title">WORK</div>

<div class="section">

    <div class="viewer-wrap">

        <button class="arrow left" onclick="prev()">‹</button>

        <div class="viewer">
            <img id="main" src="image/IMG_4391.jpg">
        </div>

        <button class="arrow right" onclick="next()">›</button>

    </div>

    <div class="thumb-list">
        <div class="thumb" onclick="set(0)"><img src="image/IMG_4391.jpg"></div>
        <div class="thumb" onclick="set(1)"><img src="image/IMG_4392.jpg"></div>
        <div class="thumb" onclick="set(2)"><img src="image/IMG_4393.jpg"></div>
        <div class="thumb" onclick="set(3)"><img src="image/IMG_4394.jpg"></div>
        <div class="thumb" onclick="set(4)"><img src="image/IMG_4396.jpg"></div>
        <div class="thumb" onclick="set(5)"><img src="image/IMG_4397.jpg"></div>
        <div class="thumb" onclick="set(6)"><img src="image/IMG_4398.jpg"></div>
    </div>

</div>

<div class="section">
    <div class="card" onclick="window.open('https://youtube.com','_blank')">
        <h3>YouTube</h3>
        <p>Vlog / Cinematic</p>
    </div>

    <div class="card" onclick="window.open('https://tiktok.com','_blank')">
        <h3>TikTok</h3>
        <p>Short Form</p>
    </div>
</div>

<footer class="footer">
    <div class="footer-inner">

        <div>© HAPELY</div>

        <div class="sns">

            <a href="https://instagram.com" target="_blank">
                <svg class="icon" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="5"/>
                    <circle cx="12" cy="12" r="3.5"/>
                    <circle cx="17.5" cy="6.5" r="1.2"/>
                </svg>
            </a>

            <a href="https://youtube.com" target="_blank">
                <svg class="icon" viewBox="0 0 24 24">
                    <rect x="3" y="5" width="18" height="14" rx="4"/>
                    <path d="M10 9l5 3-5 3z"/>
                </svg>
            </a>

            <a class="tiktok">♪</a>

        </div>

    </div>
</footer>

<script>
const images = [
"image/IMG_4391.jpg",
"image/IMG_4392.jpg",
"image/IMG_4393.jpg",
"image/IMG_4394.jpg",
"image/IMG_4396.jpg",
"image/IMG_4397.jpg",
"image/IMG_4398.jpg"
];

let i = 0;
let direction = "right";

function animate(){
    const img = document.getElementById("main");
    img.classList.remove("slide-in-left","slide-in-right");
    void img.offsetWidth;
    img.classList.add(direction === "right" ? "slide-in-right" : "slide-in-left");
}

function set(index){
    direction = index > i ? "right" : "left";
    i = index;
    update();
}

function next(){
    direction = "right";
    i = (i + 1) % images.length;
    update();
}

function prev(){
    direction = "left";
    i = (i - 1 + images.length) % images.length;
    update();
}

function update(){
    animate();
    document.getElementById("main").src = images[i];

    document.querySelectorAll(".thumb").forEach((t,idx)=>{
        t.classList.toggle("active", idx === i);
    });
}

update();
</script>

</body>
</html>
