<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAPELY｜HOME</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#D6E4F5;
    --text:#1f1a17;
    --muted:#4a3f3a;
}

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:sans-serif;
    color:var(--text);
    overflow-x:hidden;
}

/* ================= HEADER（完全固定プロ仕様） ================= */
.header{
    position:fixed;
    inset:0 0 auto 0;
    height:64px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 18px;
    background:rgba(214,228,245,0.78);
    backdrop-filter:blur(12px);

    z-index:9999;
}

.logo{
    font-family:'Cormorant Garamond', serif;
    font-size:18px;
    letter-spacing:2px;
}

/* NAV */
.nav{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
}

.nav a{
    font-size:11px;
    letter-spacing:1px;
    text-decoration:none;
    color:var(--text);
    opacity:0.75;
    transition:0.25s ease;
    position:relative;
}

.nav a:hover{
    opacity:1;
    transform:translateY(-2px);
}

.nav a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-4px;
    width:0%;
    height:1px;
    background:var(--text);
    transition:0.25s ease;
}

.nav a:hover::after{
    width:100%;
}

/* ================= SECTION（崩れないgrid構造） ================= */
section{
    min-height:100svh;
    display:grid;
    place-items:center;
    text-align:center;

    padding:80px 16px;
    position:relative;
}

/* HERO */
.hero h1{
    font-family:'Cormorant Garamond', serif;
    font-size:clamp(34px,5vw,46px);
}

.hero p{
    font-size:13px;
    color:var(--muted);
}

/* ================= IMAGE（スマホ安定構造） ================= */
.media{
    position:absolute;
    inset:0;
    display:grid;
    place-items:center;
    text-decoration:none;
}

.media img{
    width:min(92%,1100px);
    height:72vh;
    object-fit:cover;
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,0.12);
    transition:0.35s ease;
}

.media:hover img{
    transform:scale(1.02);
}

/* ================= TEXT ================= */
h2{
    font-family:'Cormorant Garamond', serif;
    font-size:32px;
    z-index:2;
}

p{
    font-size:13px;
    color:var(--muted);
    z-index:2;
}

/* ================= ANIMATION ================= */
.fade{
    opacity:0;
    transform:translateY(24px);
    transition:0.7s ease;
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}

/* ================= FOOTER（完全安定版） ================= */
.footer{
    background:#fff;
    padding:40px 16px;
    border-top:1px solid rgba(0,0,0,0.08);
}

.footer-inner{
    max-width:1000px;
    margin:0 auto;

    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:16px;
}

/* SNS（絶対禁止 position） */
.sns{
    display:flex;
    gap:18px;
    align-items:center;
    justify-content:center;
}

/* ================= ICON（100%固定） ================= */
.icon{
    width:30px;
    height:30px;

    stroke:#2f241f !important;
    fill:none !important;
    stroke-width:1.6;

    opacity:0.85;
    transition:0.25s ease;
}

.icon *{
    stroke:#2f241f !important;
    fill:none !important;
}

.icon:hover{
    opacity:1;
    transform:translateY(-3px);
}

/* TikTok */
.tiktok{
    font-size:18px;
    color:#2f241f !important;
    text-decoration:none;
    opacity:0.85;
    transition:0.25s ease;
}

.tiktok:hover{
    opacity:1;
    transform:translateY(-3px);
}

/* ================= MOBILE ================= */
@media(max-width:768px){

    .header{
        flex-direction:column;
        height:auto;
        padding:10px;
        gap:6px;
    }

    .nav{
        justify-content:center;
    }

    .media img{
        height:55vh;
    }

    .footer-inner{
        flex-direction:column;
        text-align:center;
    }
}
</style>
</head>

<body>

<header class="header">
    <div class="logo">HAPELY</div>

    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="service.html">SERVICE</a>
        <a href="work.html">WORK</a>
        <a href="contact.html">CONTACT</a>
    </nav>
</header>

<section class="hero fade">
    <div>
        <h1>HAPELY</h1>
        <p>Creator｜tsuna</p>
    </div>
</section>

<section class="fade">
    <a href="about.html" class="media">
        <img src="image/IMG_4385.jpg">
    </a>
    <h2>ABOUT</h2>
</section>

<section class="fade">
    <a href="service.html" class="media">
        <img src="image/IMG_4386.jpg">
    </a>
    <h2>SERVICE</h2>
</section>

<section class="fade">
    <a href="work.html" class="media">
        <img src="image/IMG_4387.jpg">
    </a>
    <h2>WORK</h2>
</section>

<section class="fade">
    <a href="contact.html" class="media">
        <img src="image/IMG_4390.jpg">
    </a>
    <h2>CONTACT</h2>
</section>

<footer class="footer">
    <div class="footer-inner">

        <div>© HAPELY</div>

        <div class="sns">

            <a href="https://www.instagram.com/china.tsuna.tuna/">
                <svg class="icon" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="5"/>
                    <circle cx="12" cy="12" r="3.5"/>
                    <circle cx="17.5" cy="6.5" r="1.2"/>
                </svg>
            </a>

            <a href="https://www.youtube.com/">
                <svg class="icon" viewBox="0 0 24 24">
                    <rect x="3" y="5" width="18" height="14" rx="4"/>
                    <path d="M10 9l5 3-5 3z"/>
                </svg>
            </a>

            <a href="https://www.tiktok.com/" class="tiktok">♪</a>

        </div>

    </div>
</footer>

<script>
const targets = document.querySelectorAll(".fade");

const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
},{threshold:0.2});

targets.forEach(el=>observer.observe(el));
</script>

</body>
</html>
