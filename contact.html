<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTACT｜HAPELY</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#D6E4F5;
    --text:#1f1a17;
    --muted:#4a3f3a;
}

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:sans-serif;
    color:var(--text);
    overflow-x:hidden;
}

/* ================= HEADER（完全統一） ================= */
.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:64px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 18px;
    background:rgba(214,228,245,0.78);
    backdrop-filter:blur(12px);

    z-index:9999;
}

.logo{
    font-family:'Cormorant Garamond', serif;
    font-size:18px;
    letter-spacing:2px;
}

.nav{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
}

.nav a{
    font-size:11px;
    letter-spacing:1px;
    text-decoration:none;
    color:var(--text);
    opacity:0.75;
    transition:0.25s ease;
    position:relative;
}

.nav a:hover{
    opacity:1;
    transform:translateY(-2px);
}

.nav a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-4px;
    width:0%;
    height:1px;
    background:var(--text);
    transition:0.25s ease;
}

.nav a:hover::after{
    width:100%;
}

/* ================= CONTENT ================= */
.wrapper{
    min-height:100svh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;

    padding:120px 16px 80px;
}

h1{
    font-family:'Cormorant Garamond', serif;
    font-size:clamp(42px,5vw,64px);
    margin-bottom:10px;
}

.subtitle{
    color:var(--muted);
    margin-bottom:40px;
    font-size:13px;
}

/* ================= FORM ================= */
form{
    width:100%;
    max-width:420px;

    display:flex;
    flex-direction:column;
    gap:14px;
}

input, textarea{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#fff;
    font-size:14px;
    outline:none;
    color:var(--text);
    box-shadow:0 8px 30px rgba(0,0,0,0.05);
}

textarea{
    min-height:150px;
    resize:vertical;
}

button{
    margin-top:6px;
    padding:14px;
    border:none;
    border-radius:999px;
    background:var(--text);
    color:#fff;
    font-size:12px;
    letter-spacing:2px;
    cursor:pointer;
    transition:0.25s ease;
}

button:hover{
    transform:translateY(-2px);
    opacity:0.9;
}

/* ================= THANK YOU ================= */
.thankyou{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:var(--bg);
    opacity:0;
    pointer-events:none;
    transition:0.5s ease;
    z-index:99999;
}

.thankyou.show{
    opacity:1;
    pointer-events:auto;
}

.thankyou h2{
    font-family:'Cormorant Garamond', serif;
    font-size:54px;
}

.thankyou p{
    color:var(--muted);
    font-size:14px;
}

/* ================= FOOTER（完全統一） ================= */
.footer{
    background:#fff;
    padding:40px 16px;
    border-top:1px solid rgba(0,0,0,0.08);
}

.footer-inner{
    max-width:1000px;
    margin:0 auto;

    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:16px;
}

/* SNS（絶対position禁止） */
.sns{
    display:flex;
    gap:18px;
    align-items:center;
    justify-content:center;
}

/* ICON統一固定 */
.icon{
    width:30px;
    height:30px;
    stroke:#2f241f !important;
    fill:none !important;
    stroke-width:1.6;
    opacity:0.85;
    transition:0.25s ease;
}

.icon:hover{
    opacity:1;
    transform:translateY(-3px);
}

.tiktok{
    font-size:18px;
    color:#2f241f !important;
    text-decoration:none;
    opacity:0.85;
    transition:0.25s ease;
}

.tiktok:hover{
    opacity:1;
    transform:translateY(-3px);
}

/* ================= MOBILE ================= */
@media(max-width:768px){

    .header{
        flex-direction:column;
        height:auto;
        padding:10px;
        gap:6px;
    }

    .nav{
        justify-content:center;
    }

    .footer-inner{
        flex-direction:column;
        text-align:center;
    }
}
</style>
</head>

<body>

<header class="header">
    <div class="logo">HAPELY</div>

    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="service.html">SERVICE</a>
        <a href="work.html">WORK</a>
        <a href="contact.html">CONTACT</a>
    </nav>
</header>

<div class="wrapper">

    <h1>CONTACT</h1>
    <p class="subtitle">Feel free to contact me.</p>

    <form id="form" action="https://formspree.io/f/xgoqjkrr" method="POST">

        <input type="text" name="name" placeholder="お名前" required>
        <input type="email" name="email" placeholder="メールアドレス" required>
        <textarea name="message" placeholder="お問い合わせ内容" required></textarea>

        <button type="submit">SEND</button>

    </form>

</div>

<div class="thankyou" id="thankyou">
    <h2>THANK YOU</h2>
    <p>MESSAGE SENT</p>
</div>

<footer class="footer">
    <div class="footer-inner">

        <div>© HAPELY</div>

        <div class="sns">

            <a href="https://www.instagram.com/china.tsuna.tuna/" target="_blank">
                <svg class="icon" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="5"/>
                    <circle cx="12" cy="12" r="3.5"/>
                    <circle cx="17.5" cy="6.5" r="1.2"/>
                </svg>
            </a>

            <a href="https://www.youtube.com/" target="_blank">
                <svg class="icon" viewBox="0 0 24 24">
                    <rect x="3" y="5" width="18" height="14" rx="4"/>
                    <path d="M10 9l5 3-5 3z"/>
                </svg>
            </a>

            <a href="https://www.tiktok.com/" class="tiktok">♪</a>

        </div>

    </div>
</footer>

<script>
const form = document.getElementById("form");
const thankyou = document.getElementById("thankyou");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const btn = form.querySelector("button");
    btn.textContent = "SENDING...";

    try{
        const res = await fetch(form.action, {
            method:"POST",
            body:new FormData(form),
            headers:{ "Accept":"application/json" }
        });

        if(res.ok){
            thankyou.classList.add("show");
            form.reset();

            setTimeout(()=>{
                thankyou.classList.remove("show");
            },2500);
        }
    }catch(e){
        alert("通信エラー");
    }

    btn.textContent = "SEND";
});
</script>

</body>
</html>
